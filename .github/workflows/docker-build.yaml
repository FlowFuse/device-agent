name: Docker build

on:
  pull_request:
    paths:
      - 'docker/**'
      - '.github/workflows/docker-build.yaml'

jobs:
  docker-build:
    name: 'Build docker image: Node ${{ matrix.node }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - node: 18
            platforms: linux/amd64,linux/arm64,linux/arm/v7
          - node: 20
            platforms: linux/amd64,linux/arm64,linux/arm/v7
          - node: 22
            platforms: linux/amd64,linux/arm64,linux/arm/v7
          - node: 24
            platforms: linux/amd64,linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 #v5.3.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platforms }}
          tags: flowfuse-device-agent-pr:${{ matrix.node }}-scan
          push: false
          load: true
          build-args: |
            NODE_VERSION=${{ matrix.node }}

      - name: Perform SAST scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: flowfuse-device-agent-pr:${{ matrix.node }}-scan
          trivy-config: .github/trivy.yaml
          output: 'sast-results.sarif'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: sast-results.sarif
